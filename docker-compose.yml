networks:
  tim-network:
    driver: bridge

volumes:
  esdata:
  redisdata:
  rabbitmqdata:
  miniodata:
  ollamadata:
  chromadata:
  briefingsdata:
  extractordata:

# ─────────────────────────────────────────────
# CAPA DE PLATAFORMA — OpenCTI + dependencias
# ─────────────────────────────────────────────

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    profiles: [platform]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx4g
      - cluster.routing.allocation.disk.threshold_enabled=false
    volumes:
      - esdata:/usr/share/elasticsearch/data
    mem_limit: 4g
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - tim-network
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    profiles: [platform]
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    # no host port — access via soc-dashboard nginx on :5602 with basic auth
    mem_limit: 1g
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - tim-network
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    profiles: [platform]
    volumes:
      - redisdata:/data
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tim-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    profiles: [platform]
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    ports:
      - "127.0.0.1:15672:15672"   # management UI — localhost only
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - tim-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    profiles: [platform]
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    ports:
      - "127.0.0.1:9001:9001"     # consola web — localhost only
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - tim-network
    restart: unless-stopped

  opencti:
    image: opencti/platform:6.4.0
    profiles: [platform]
    environment:
      - NODE_OPTIONS=--max-old-space-size=2048
      - APP__PORT=8080
      - APP__BASE_URL=${OPENCTI_BASE_URL}
      - APP__ADMIN__EMAIL=${OPENCTI_ADMIN_EMAIL}
      - APP__ADMIN__PASSWORD=${OPENCTI_ADMIN_PASSWORD}
      - APP__ADMIN__TOKEN=${OPENCTI_ADMIN_TOKEN}
      - APP__APP_LOGS__LOGS_LEVEL=error
      - ELASTICSEARCH__URL=http://elasticsearch:9200
      - REDIS__HOSTNAME=redis
      - REDIS__PORT=6379
      - RABBITMQ__HOSTNAME=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=${RABBITMQ_USER}
      - RABBITMQ__PASSWORD=${RABBITMQ_PASSWORD}
      - MINIO__ENDPOINT=minio
      - MINIO__PORT=9000
      - MINIO__USE_SSL=false
      - MINIO__ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO__SECRET_KEY=${MINIO_SECRET_KEY}
      - APP__TELEMETRY__METRICS__ENABLED=true
    ports:
      - "127.0.0.1:8080:8080"
    mem_limit: 2g
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - tim-network
    restart: unless-stopped

  worker:
    image: opencti/worker:6.4.0
    profiles: [platform]
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - WORKER_LOG_LEVEL=error
    mem_limit: 512m
    depends_on:
      opencti:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python.*worker"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - tim-network
    restart: unless-stopped

  # Conector MITRE ATT&CK — carga el framework completo en OpenCTI al iniciar
  connector-mitre:
    image: opencti/connector-mitre:6.4.0
    profiles: [platform]
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_MITRE_ID}
      - CONNECTOR_NAME=MITRE ATT&CK
      - CONNECTOR_SCOPE=marking-definition,identity,attack-pattern,course-of-action,intrusion-set,campaign,malware,tool,report
      - CONNECTOR_UPDATE_EXISTING_DATA=true
      - CONNECTOR_RUN_AND_TERMINATE=false
      - MITRE_REMOVE_STATEMENT_MARKING=true
      - MITRE_INTERVAL=7
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*mitre' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      opencti:
        condition: service_healthy
    networks:
      - tim-network
    restart: unless-stopped

  connector-ipinfo:
    image: opencti/connector-ipinfo:6.4.0
    profiles: [platform]
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_IPINFO_ID}
      - CONNECTOR_NAME=IpInfo
      - CONNECTOR_SCOPE=IPv4-Addr,IPv6-Addr
      - CONNECTOR_AUTO=true
      - CONNECTOR_CONFIDENCE_LEVEL=75
      - CONNECTOR_LOG_LEVEL=error
      - IPINFO_TOKEN=${IPINFO_TOKEN}
      - IPINFO_MAX_TLP=TLP:AMBER
    mem_limit: 256m
    depends_on:
      opencti:
        condition: service_healthy
    networks:
      - tim-network
    restart: unless-stopped

  connector-cve:
    build: ./services/connector-cve
    profiles: [platform]
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_CVE_ID}
      - CONNECTOR_NAME=Common Vulnerabilities and Exposures
      - CONNECTOR_SCOPE=vulnerability
      - CONNECTOR_RUN_AND_TERMINATE=false
      - CONNECTOR_LOG_LEVEL=error
      - CVE_BASE_URL=https://services.nvd.nist.gov/rest/json/cves
      - CVE_API_KEY=${CVE_NVD_API_KEY}
      - CVE_INTERVAL=2
      - CVE_MAX_DATE_RANGE=2
      - CVE_MAINTAIN_DATA=true
      - CVE_PULL_HISTORY=true
      - CVE_HISTORY_START_YEAR=2025
    mem_limit: 512m
    depends_on:
      opencti:
        condition: service_healthy
    networks:
      - tim-network
    restart: unless-stopped

# ─────────────────────────────────────────────
# CAPA AI — Ollama + ChromaDB
# ─────────────────────────────────────────────

  ollama:
    image: ollama/ollama:latest
    profiles: [platform]
    volumes:
      - ollamadata:/root/.ollama
    mem_limit: 2g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - tim-network
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    profiles: [platform]
    volumes:
      - chromadata:/chroma/chroma
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tim-network
    restart: unless-stopped

# ─────────────────────────────────────────────
# CAPA DE INGESTA — Feed Orchestrator (custom)
# ─────────────────────────────────────────────

  feed-orchestrator:
    build: ./services/feed-orchestrator
    profiles: [feeds]
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - REDIS_URL=redis://redis:6379
      - ES_URL=http://elasticsearch:9200
      - OTX_API_KEY=${OTX_API_KEY}
      - MALWAREBAZAAR_AUTH_KEY=${MALWAREBAZAAR_AUTH_KEY}
      - THREATFOX_AUTH_KEY=${THREATFOX_AUTH_KEY}
    mem_limit: 1g
    depends_on:
      opencti:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # ponytail: python stdlib probe — curl not available in python:3.12-slim
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - tim-network
    restart: unless-stopped

# ─────────────────────────────────────────────
# CAPA AI — Servicios custom Python
# ─────────────────────────────────────────────

  intel-extractor:
    build: ./services/intel-extractor
    profiles: [extract]
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
      - DB_PATH=/data/stats.db
    volumes:
      - extractordata:/data
    mem_limit: 1g
    depends_on:
      opencti:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - tim-network
    restart: unless-stopped
    healthcheck:
      # ponytail: python stdlib probe — curl not available in python:3.12-slim
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  semantic-engine:
    build: ./services/semantic-engine
    profiles: [semantic]
    ports:
      - "127.0.0.1:8002:8002"
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - CHROMADB_URL=http://chromadb:8000
      - POLL_INTERVAL_SECONDS=300
      - SIMILARITY_THRESHOLD=0.3
      - OPENCTI_BASE_URL=http://localhost:8080
    mem_limit: 1g
    healthcheck:
      # ponytail: python stdlib probe — curl not available in python:3.12-slim
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      opencti:
        condition: service_healthy
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - tim-network
    restart: unless-stopped

  briefing-generator:
    build: ./services/briefing-generator
    profiles: [briefings]
    ports:
      - "127.0.0.1:8003:8003"
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
      - DB_PATH=/data/briefings.db
    volumes:
      - briefingsdata:/data
    mem_limit: 1g
    depends_on:
      opencti:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      # ponytail: python stdlib probe — curl not available in python:3.12-slim
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - tim-network
    restart: unless-stopped

# ─────────────────────────────────────────────
# CAPA DE PRESENTACIÓN — SOC Dashboard
# ─────────────────────────────────────────────

  soc-dashboard:
    build: ./services/dashboard
    profiles: [dashboard]
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
      - "127.0.0.1:5602:5602"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./services/dashboard/.kibana.htpasswd:/etc/nginx/.kibana.htpasswd:ro
    mem_limit: 512m
    depends_on:
      feed-orchestrator:
        condition: service_healthy
      semantic-engine:
        condition: service_healthy
      briefing-generator:
        condition: service_healthy
    networks:
      - tim-network
    restart: unless-stopped
